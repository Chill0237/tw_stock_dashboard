<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill 的台股觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans dark:bg-slate-950 dark:text-slate-200">

    <header class="border-b border-slate-200 bg-slate-50 px-6 py-0.5 sticky top-0 z-50 dark:border-slate-800 dark:bg-slate-950">
        <div class="flex flex-wrap items-center justify-between gap-y-1">

            <div class="flex items-center space-x-4">
                <h1 class="text-base font-bold text-slate-800 tracking-widest uppercase dark:text-slate-200">Chill 的台股觀測站</h1>
            </div>

            <div class="flex items-center space-x-3">
                <!-- 搜尋欄 -->
                <div class="relative">
                    <input id="stock-search" type="text" placeholder="搜尋股票代號/名稱"
                        class="w-48 bg-white border border-slate-200 text-slate-800 px-2 py-1 text-xs focus:outline-none focus:border-emerald-500 placeholder-slate-400 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200 dark:placeholder-slate-600">
                    <div id="search-dropdown" class="absolute top-full left-0 right-0 bg-white border border-slate-200 max-h-60 overflow-y-auto hidden z-[200] dark:bg-slate-900 dark:border-slate-700"></div>
                </div>
                <span class="text-xs text-slate-400 dark:text-slate-500">日期</span>
                <select id="date-select" class="bg-white border border-slate-200 text-slate-800 px-2 py-1 text-xs focus:outline-none dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200">
                    <option value="latest">latest</option>
                </select>

                <!-- Theme Toggle: 雙按鈕群組（仿 MA/BB 切換樣式） -->
                <div class="flex border border-slate-200 rounded dark:border-slate-700 overflow-hidden" title="切換深色/淺色模式">
                    <button id="theme-light" class="px-2 py-1 flex items-center justify-center text-slate-500" data-theme="light">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </button>
                    <button id="theme-dark" class="px-2 py-1 flex items-center justify-center text-slate-500 dark:text-slate-400" data-theme="dark">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="data-status" class="text-xs text-slate-500 flex flex-wrap gap-x-3 gap-y-0.5 leading-5 mt-1 dark:text-slate-400">
            <span class="text-slate-400 dark:text-slate-700">狀態載入中...</span>

        </div>

        <div class="flex flex-wrap mt-1">
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-emerald-500 text-emerald-600 dark:text-emerald-500" data-tab="tab-buy-amount">法人買超(金額)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-sell-amount">法人賣超(金額)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-buy-shares">法人買超(張數)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-sell-shares">法人賣超(張數)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-margin">融資券增減</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-momentum">爆量</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-large">大戶增減</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300" data-tab="tab-watchlist">自選</button>
        </div>
    </header>

    <main class="p-1.5 max-w-7xl mx-auto">

        <div id="tab-buy-amount" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-sell-amount" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-buy-shares" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-sell-shares" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-margin" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-momentum" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-large" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-watchlist" class="tab-content hidden">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded p-4">
                <div class="flex items-center gap-3 mb-3">
                    <!-- 自訂 dropdown：風格與個股 modal 的 watchlist dropdown 一致 -->
                    <div id="watchlist-select-wrapper" class="relative">
                        <button id="watchlist-select-btn" class="flex items-center justify-between gap-1.5 px-2.5 py-1 text-xs w-[180px] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm rounded text-slate-800 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">
                            <span id="watchlist-select-label" class="truncate shrink">選擇清單</span>
                            <svg class="w-3 h-3 shrink-0 text-slate-700 dark:text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div id="watchlist-select-dropdown" class="absolute hidden left-0 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-lg rounded py-1 z-[150] w-[220px]" style="top:100%;margin-top:2px;"></div>
                    </div>
                    <button id="watchlist-edit-trigger" class="px-3 py-1 text-xs border border-slate-300 text-slate-700 hover:text-slate-800 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-400 dark:hover:text-slate-300 dark:hover:bg-slate-800">編輯</button>
                </div>
                <div class="overflow-x-auto">
                    <table id="watchlist-table" class="w-full table-fixed text-xs border-collapse">
                        <thead>
                            <tr class="text-slate-700 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
                                <th class="w-[11%] py-2 px-2 text-left font-normal"><span class="inline-flex items-center gap-1 cursor-pointer select-none hover:text-slate-800 dark:hover:text-slate-300" data-sort="stock_id">代號</span></th>
                                <th class="w-[20%] py-2 px-2 text-left font-normal"><span class="inline-flex items-center gap-1 cursor-pointer select-none hover:text-slate-800 dark:hover:text-slate-300" data-sort="stock_name">名稱</span></th>
                                <th class="w-[17%] py-2 px-2 text-right font-normal"><span class="inline-flex items-center gap-1 cursor-pointer select-none hover:text-slate-800 dark:hover:text-slate-300" data-sort="close">收盤</span></th>
                                <th class="w-[17%] py-2 px-2 text-right font-normal"><span class="inline-flex items-center gap-1 cursor-pointer select-none hover:text-slate-800 dark:hover:text-slate-300" data-sort="change">漲跌</span></th>
                                <th class="w-[17%] py-2 px-2 text-right font-normal"><span class="inline-flex items-center gap-1 cursor-pointer select-none hover:text-slate-800 dark:hover:text-slate-300" data-sort="change_pct">漲跌幅</span></th>
                                <th class="w-[18%] py-2 px-2 text-right font-normal"><span class="inline-flex items-center gap-1 cursor-pointer select-none hover:text-slate-800 dark:hover:text-slate-300" data-sort="volume">成交量</span></th>
                            </tr>
                        </thead>
                        <tbody id="watchlist-tbody" class="divide-y divide-slate-100 dark:divide-slate-800">
                            <tr><td colspan="6" class="text-center py-3 text-slate-700 dark:text-slate-400 text-2xs">loading</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script src="watchlist-store.js"></script>
    <script src="app.js"></script>
    <script src="stock-modal.js"></script>
    <script src="watchlist-manager.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // 初始化 StockModal
        StockModal.init();
        // 初始化 WatchlistManagerModal
        WatchlistManagerModal.init();

        // ── 搜尋功能 ──
        const searchInput = document.getElementById("stock-search");
        const dropdown = document.getElementById("search-dropdown");
        let searchIndex = [];
        let debounceTimer = null;

        // 載入 index.json（若 StockModal 已載入可直接用其 stockIndex，但為獨立性另載一份）
        fetch("./api/stock/index.json").then(r => r.json()).then(data => { searchIndex = data; }).catch(() => {});

        function renderDropdown(query) {
            if (!query || query.length < 1) { dropdown.classList.add("hidden"); dropdown.innerHTML = ""; return; }
            const q = query.toLowerCase();
            const matches = searchIndex.filter(item =>
                item.stock_id.toLowerCase().includes(q) || item.stock_name.toLowerCase().includes(q)
            ).slice(0, 30);

            if (!matches.length) { dropdown.classList.add("hidden"); dropdown.innerHTML = ""; return; }

            dropdown.innerHTML = matches.map(item =>
                `<div class="px-3 py-1.5 text-xs text-slate-800 hover:bg-slate-100 cursor-pointer border-b border-slate-200 last:border-0 flex justify-between dark:text-slate-200 dark:hover:bg-slate-800 dark:border-slate-700" data-stock-id="${item.stock_id}">
                    <span><span class="text-slate-500 dark:text-slate-400">${item.stock_id}</span> <span class="text-slate-800 dark:text-slate-200">${item.stock_name}</span></span>
                </div>`
            ).join("");
            dropdown.classList.remove("hidden");
        }

        searchInput.addEventListener("input", () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => renderDropdown(searchInput.value), 150);
        });

        searchInput.addEventListener("focus", () => {
            if (searchInput.value) renderDropdown(searchInput.value);
        });

        searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Escape") { dropdown.classList.add("hidden"); searchInput.blur(); }
            if (e.key === "Enter") {
                const first = dropdown.querySelector("[data-stock-id]");
                if (first) {
                    const sid = first.dataset.stockId;
                    dropdown.classList.add("hidden");
                    searchInput.value = "";
                    StockModal.openStockModal(sid);
                }
            }
        });

        dropdown.addEventListener("click", (e) => {
            const item = e.target.closest("[data-stock-id]");
            if (item) {
                const sid = item.dataset.stockId;
                dropdown.classList.add("hidden");
                searchInput.value = "";
                StockModal.openStockModal(sid);
            }
        });

        // 點擊其他地方關閉下拉
        document.addEventListener("click", (e) => {
            if (!e.target.closest("#stock-search") && !e.target.closest("#search-dropdown")) {
                dropdown.classList.add("hidden");
            }
        });

        // ── Theme Toggle (雙按鈕群組，仿 MA/BB 切換樣式) ──
        const themeLightBtn = document.getElementById("theme-light");
        const themeDarkBtn = document.getElementById("theme-dark");
        const ACTIVE_THEME_CLS = 'bg-slate-200 text-slate-800 dark:bg-slate-700 dark:text-slate-200';
        const INACTIVE_THEME_CLS = 'text-slate-500 dark:text-slate-400';
        // isDark=true → Dark Mode (加上 dark class)
        function applyTheme(isDark) {
            document.documentElement.classList.toggle("dark", isDark);
            localStorage.setItem("theme", isDark ? "dark" : "light");
            // 更新按鈕 active 狀態
            themeLightBtn.className = `px-2 py-1 flex items-center justify-center ${isDark ? INACTIVE_THEME_CLS : ACTIVE_THEME_CLS}`;
            themeDarkBtn.className = `px-2 py-1 flex items-center justify-center ${isDark ? ACTIVE_THEME_CLS : INACTIVE_THEME_CLS}`;
            // 通知其他模組 theme 變更 (StockModal 的圖表需要手動更新)
            window.dispatchEvent(new CustomEvent("themechange", { detail: { isDark } }));
        }
        themeLightBtn.addEventListener("click", () => applyTheme(false));
        themeDarkBtn.addEventListener("click", () => applyTheme(true));
        // 初始化：預設 dark（無記錄 saved!=='light' → true → Dark Mode）
        const saved = localStorage.getItem("theme");
        applyTheme(saved !== "light");
    });
    </script>
</body>
</html>
