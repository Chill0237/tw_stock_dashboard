<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill 的台股觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-300 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-black px-6 py-0.5 sticky top-0 z-50">
        <div class="flex flex-wrap items-center justify-between gap-y-1">

            <div class="flex items-center space-x-4">
                <h1 class="text-sm font-bold text-slate-100 tracking-widest uppercase">Chill 的台股觀測站</h1>
            </div>

            <div class="flex items-center space-x-2">
                <span class="text-xs text-slate-500">日期</span>
                <select id="date-select" class="bg-black border border-slate-700 text-slate-300 px-2 py-1 text-xs focus:outline-none">
                    <option value="latest">latest</option>
                </select>
            </div>
        </div>

        <div id="data-status" class="text-2xs text-slate-600 flex flex-wrap gap-x-3 gap-y-0.5 leading-5 mt-1">
            <span class="text-slate-700">狀態載入中...</span>

        </div>

        <div class="flex flex-wrap mt-1">
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-emerald-500 text-emerald-500" data-tab="tab-buy-amount">法人買超(金額)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="tab-sell-amount">法人賣超(金額)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="tab-buy-shares">法人買超(張數)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="tab-sell-shares">法人賣超(張數)</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="tab-margin">融資券增減</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="tab-momentum">爆量</button>
            <button class="tab-btn px-3 py-1.5 text-xs font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="tab-large">大戶增減</button>
        </div>
    </header>

    <main class="p-1.5 max-w-7xl mx-auto">

        <div id="tab-buy-amount" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-sell-amount" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-buy-shares" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-sell-shares" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-margin" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-momentum" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>
        <div id="tab-large" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch"></div>

    </main>

    <script src="app.js"></script>
</body>
</html>
